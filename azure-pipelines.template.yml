parameters:
- name: projectName
  type: string

variables:
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

jobs:
  - job: Build
    pool: 'self-hosted'
    steps:
      - checkout: self
        fetchDepth: 0
      - task: UseDotNet@2
        inputs:
          version: '10.x'
      - task: DotNetCoreCLI@2
        displayName: "Install Fantomas tool"
        inputs:
          command: 'custom'
          custom: 'tool'
          arguments: 'install -g fantomas'
      - task: Bash@3
        displayName: "Run Fantomas check"
        inputs:
          targetType: 'inline'
          script: |
            fantomas "src/${{ parameters.projectName }}" --check
      - task: Cache@2
        displayName: Cache v2 task
        inputs:
          key: 'nuget | "$(Agent.OS)" | ${{ parameters.projectName }} | src/${{ parameters.projectName }}/packages.lock.json'
          restoreKeys: |
            nuget | "$(Agent.OS)" | ${{ parameters.projectName }}
            nuget | "$(Agent.OS)"
          path: '$(NUGET_PACKAGES)'
          cacheHitVar: 'CACHE_RESTORED'
      - task: DotNetCoreCLI@2
        name: Restore
        condition: ne(variables.CACHE_RESTORED, true)
        inputs:
          command: 'restore'
          projects: 'src/${{ parameters.projectName }}/*.fsproj'
          arguments: '--locked-mode'
      - task: DotNetCoreCLI@2
        name: Build
        inputs:
          command: 'build'
          projects: 'src/${{ parameters.projectName }}/*.fsproj'
          arguments: '-c Release'
      - task: DotNetCoreCLI@2
        name: Pack
        inputs:
          command: 'pack'
          packagesToPack: 'src/${{ parameters.projectName }}/${{ parameters.projectName }}.fsproj'
          nobuild: true
      - task: PublishPipelineArtifact@1
        name: Publish
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifact: 'drop'
  - deployment: Deploy
    environment: prd
    pool:
      vmImage: 'windows-latest'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: drop
            - task: NuGetCommand@2
              displayName: 'Push to NuGet.org'
              inputs:
                command: 'push'
                packagesToPush: '$(Pipeline.Workspace)/drop/*.nupkg'
                nuGetFeedType: 'external'
                publishFeedCredentials: 'nuget'
