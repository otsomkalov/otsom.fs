trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/otsom.fs.Resources/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/otsom.fs.Resources/*

variables:
  BuildConfiguration: 'Release'

jobs:
  - job: Build
    pool: "self-hosted"
    steps:
      - checkout: self
        fetchDepth: 0
      - task: UseDotNet@2
        inputs:
          version: '9.x'
      - task: DotNetCoreCLI@2
        displayName: "Install Fantomas tool"
        inputs:
          command: 'custom'
          custom: 'tool'
          arguments: 'install -g fantomas'
      - task: Bash@3
        displayName: "Run Fantomas check"
        inputs:
          targetType: 'inline'
          script: |
            fantomas "src/otsom.fs.Resources" --check
      - task: DotNetCoreCLI@2
        name: Restore
        inputs:
          command: 'restore'
          projects: 'src/otsom.fs.Resources/*.fsproj'
      - task: DotNetCoreCLI@2
        name: Build
        inputs:
          command: 'build'
          projects: 'src/otsom.fs.Resources/*.fsproj'
          arguments: '-c $(BuildConfiguration)'
      - task: DotNetCoreCLI@2
        name: Pack
        inputs:
          command: 'pack'
          packagesToPack: 'src/otsom.fs.Resources/otsom.fs.Resources.fsproj'
          nobuild: true
      - task: PublishPipelineArtifact@1
        name: Publish
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifact: 'drop'
  - deployment: Deploy
    environment: prd
    pool:
      vmImage: 'windows-latest'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    strategy:
      runOnce:
        deploy:
          steps:
            - download: current
              artifact: drop
            - task: NuGetCommand@2
              displayName: 'Push to NuGet.org'
              inputs:
                command: 'push'
                packagesToPush: '$(Pipeline.Workspace)/drop/*.nupkg'
                nuGetFeedType: 'external'
                publishFeedCredentials: 'nuget'