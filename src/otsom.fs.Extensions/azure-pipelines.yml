trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/otsom.fs.Extensions/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/otsom.fs.Extensions/*

pool:
  vmImage: 'ubuntu-latest'

variables:
  revision: $[counter(variables['minor'], 1)] # This will get reset every time minor gets bumped.
  version: '$(major).$(minor).$(revision)'
  BuildConfiguration: 'Release'

stages:
  - stage: Build
    jobs:
      - job: Build
        displayName: Build job
        steps:
          - task: UseDotNet@2
            inputs:
              version: '8.x'
          - task: DotNetCoreCLI@2
            displayName: "Install Fantomas tool"
            inputs:
              command: 'custom'
              custom: 'tool'
              arguments: 'install -g fantomas'
          - task: Bash@3
            displayName: "Run Fantomas check"
            inputs:
              targetType: 'inline'
              script: |
                fantomas "src/otsom.fs.Extensions" --check
          - task: DotNetCoreCLI@2
            name: Restore
            inputs:
              command: 'restore'
              projects: 'src/otsom.fs.Extensions/*.fsproj'
          - task: DotNetCoreCLI@2
            name: Build
            inputs:
              command: 'build'
              projects: 'src/otsom.fs.Extensions/*.fsproj'
              arguments: '-c $(BuildConfiguration)'
          - task: DotNetCoreCLI@2
            name: Pack
            inputs:
              command: 'pack'
              packagesToPack: 'src/otsom.fs.Extensions/otsom.fs.Extensions.fsproj'
              nobuild: true
              versionEnvVar: 'version'
              versioningScheme: 'byEnvVar'
          - task: PublishPipelineArtifact@1
            name: Publish
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: 'drop'

  - stage: Deploy
    displayName: Deploy stage
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Deploy
        displayName: Deploy job
        environment: prd
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                - task: DotNetCoreCLI@2
                  displayName: 'Push to NuGet.org'
                  inputs:
                    command: 'push'
                    packagesToPush: '$(Pipeline.Workspace)/drop/*.nupkg'
                    nuGetFeedType: 'external'
                    publishFeedCredentials: 'nuget'